project: orbit-relationship-verification
connections:
  orbit:
    driver: sqlite
    path: ../../packages/context/test/fixtures/relationship-benchmarks/orbit_style_product_no_declared_constraints/data.sqlite
storage:
  state: sqlite
  search: sqlite-fts5
  git:
    auto_commit: true
    author: "ktx <ktx@example.com>"
ingest:
  adapters: []
scan:
